<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integration Guide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      theme: {
        extend: {
          colors: {
            navy: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#1a1a2e', 600: '#16162a', 700: '#121226', 800: '#0e0e20', 900: '#0a0a18' },
            flame: { 400: '#ffb347', 500: '#ff8c00', 600: '#e07b00' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .msg-appear { animation: msgIn 0.3s ease-out; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .typing-dot { animation: blink 1.4s infinite both; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
  </style>
</head>
<body class="bg-navy-500 text-white h-screen flex flex-col overflow-hidden">

  <!-- Header -->
  <header class="flex items-center gap-3 px-4 py-3 border-b border-white/10 shrink-0">
    <div class="w-8 h-8 bg-gradient-to-br from-flame-500 to-flame-400 rounded-lg flex items-center justify-center">
      <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z"/></svg>
    </div>
    <div class="flex-1">
      <h1 class="text-sm font-semibold">Integration Guide</h1>
      <p class="text-[10px] text-white/50" id="page-context">Ready to help</p>
    </div>
    <button id="settings-btn" class="p-1.5 rounded-lg hover:bg-white/10 transition-colors" title="Settings">
      <svg class="w-4 h-4 text-white/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </header>

  <!-- Journey Steps -->
  <div id="journey-bar" class="hidden px-4 py-2 border-b border-white/10 shrink-0">
    <div class="flex items-center gap-1 text-[10px] text-white/40 overflow-x-auto" id="journey-steps"></div>
  </div>

  <!-- Settings Panel (hidden by default) -->
  <div id="settings-panel" class="hidden flex-1 flex flex-col px-4 py-4 gap-4">
    <h2 class="text-sm font-semibold">Settings</h2>
    <div>
      <label class="text-xs text-white/60 block mb-1.5">MultiOn API Key</label>
      <input type="password" id="api-key-input" placeholder="Enter your API key..."
        class="w-full bg-navy-700 border border-white/10 rounded-lg px-3 py-2 text-sm text-white placeholder-white/30 focus:outline-none focus:border-flame-500 transition-colors" />
    </div>
    <button id="save-key-btn" class="bg-flame-500 hover:bg-flame-600 text-white text-sm font-medium py-2 px-4 rounded-lg transition-colors">
      Save Key
    </button>
    <p id="key-status" class="text-xs text-white/40"></p>
    <button id="back-btn" class="text-xs text-white/40 hover:text-white/70 mt-2 transition-colors">← Back to chat</button>
  </div>

  <!-- Chat Messages -->
  <div id="chat-container" class="flex-1 overflow-y-auto px-4 py-4 space-y-3">
    <div class="msg-appear flex gap-2.5">
      <div class="w-6 h-6 rounded-full bg-gradient-to-br from-flame-500 to-flame-400 flex items-center justify-center shrink-0 mt-0.5">
        <svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 12h3v8h6v-6h2v6h6v-8h3L12 2z"/></svg>
      </div>
      <div class="bg-navy-700 rounded-xl rounded-tl-sm px-3 py-2 text-sm text-white/90 max-w-[85%]">
        <p>👋 Hey! I'm your <strong>Integration Guide</strong>.</p>
        <p class="mt-1.5 text-white/60 text-xs">Tell me what you want to connect — like <em>"Help me sync HubSpot"</em> — and I'll walk you through it step by step, highlighting exactly where to click.</p>
        <p class="mt-1.5 text-white/50 text-xs">⚙️ First, set your MultiOn API key in settings.</p>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="px-4 py-3 border-t border-white/10 shrink-0">
    <form id="chat-form" class="flex gap-2">
      <input type="text" id="chat-input" placeholder="e.g. Help me sync HubSpot..."
        class="flex-1 bg-navy-700 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white placeholder-white/30 focus:outline-none focus:border-flame-500 transition-colors" />
      <button type="submit" class="bg-flame-500 hover:bg-flame-600 text-white p-2.5 rounded-xl transition-colors shrink-0">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </form>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
